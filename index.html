<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Draft Room</title>
<script src="/socket.io/socket.io.js"></script>

<style>
body{font-family:Arial;background:#f0f0f0;margin:10px;}
.player{padding:16px;border-bottom:1px solid #ddd;cursor:pointer;}
.player:hover{background:#eee;}

#tabs button{padding:10px;margin:5px;}

.cell{width:100px;border:1px solid #ccc;height:40px;display:flex;align-items:center;justify-content:center;}
.round{display:flex;}

#onClock{position:sticky;top:0;background:white;}

</style>
</head>

<body>

<h2 id="onClock">On the Clock</h2>
Timer: <span id="timer">60</span>

<div id="tabs">
<button onclick="setTab('players')">Players</button>
<button onclick="setTab('board')">Board</button>
<button onclick="setTab('rosters')">Rosters</button>
</div>

<button onclick="start()">Start</button>
<button onclick="pause()">Pause</button>
<button onclick="undo()">Undo</button>
<button onclick="exportCSV()">Export</button>

<div id="playersPanel"></div>
<div id="boardPanel"></div>
<div id="rostersPanel"></div>

<script>
const socket = io()
let state = {}
let activeTab = "players"

window.setTab = tab=>{
  activeTab = tab
  render()
}

socket.on("state", s=>{
  state = s
  render()
})

socket.on("timer", t=>{
  document.getElementById("timer").innerText = t
})

socket.on("errorMsg", msg=>alert(msg))

function render(){

let teams = state.teams || []
let order = state.draftOrder || []
let picks = state.drafted || []
let limits = state.POSITION_LIMITS || {}

let currentTeam = teams[order[state.currentPick]] || ""
document.getElementById("onClock").innerText = "On the Clock: " + currentTeam

/* PLAYERS */

let playersDiv = document.getElementById("playersPanel")
playersDiv.innerHTML = ""

if(activeTab==="players"){
(state.players||[]).forEach(p=>{

if(picks.includes(p.name)) return

let teamIndex = order[state.currentPick]
let roster = state.rosters?.[teamIndex] || {}

let limit = limits[p.position] || 99
let count = roster[p.position] || 0

let d=document.createElement("div")
d.className="player"
d.innerText=p.name+" ("+p.position+")"

if(count >= limit){
d.style.opacity=0.3
} else {
d.onclick=()=>socket.emit("draft", p.name)
}

playersDiv.appendChild(d)
})
}

/* BOARD */

let boardDiv=document.getElementById("boardPanel")
boardDiv.innerHTML=""

if(activeTab==="board"){

let cols=teams.length

for(let r=0;r<Math.ceil(picks.length/cols);r++){

let row=document.createElement("div")
row.className="round"

for(let c=0;c<cols;c++){

let idx=r*cols+c
let cell=document.createElement("div")
cell.className="cell"

if(picks[idx]){
cell.innerText=picks[idx]

if(picks[idx]==="SKIPPED"){
cell.style.background="#fbb"
cell.onclick=()=>{
let name=prompt("Enter player")
if(name) socket.emit("replacePick",{index:idx,name})
}
}
}

row.appendChild(cell)
}

boardDiv.appendChild(row)
}
}

/* ROSTERS */

let rosterDiv=document.getElementById("rostersPanel")
rosterDiv.innerHTML=""

if(activeTab==="rosters"){

(state.rosters||[]).forEach((r,i)=>{

let box=document.createElement("div")
box.innerHTML="<b>"+teams[i]+"</b>"

Object.keys(r).forEach(pos=>{
let limit = limits[pos] || "-"
let div=document.createElement("div")
div.innerText=pos+": "+r[pos]+" / "+limit
box.appendChild(div)
})

rosterDiv.appendChild(box)
})
}
}

/* ACTIONS */

window.start=()=>{
fetch("/players.json").then(r=>r.json()).then(data=>{
let users=prompt("Teams (comma separated)")
let t=users.split(",").map(x=>x.trim())
socket.emit("setup",{teams:t,players:data.players})
})
}

window.pause=()=>socket.emit("pause")
window.undo=()=>socket.emit("undo")

window.exportCSV=()=>{
let rows=[["Pick","Team","Player"]]

state.drafted.forEach((p,i)=>{
let team=state.teams[state.draftOrder[i]]
rows.push([i+1,team,p])
})

let csv=rows.map(r=>r.join(",")).join("\n")
let blob=new Blob([csv])
let a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="draft.csv"
a.click()
}
</script>

</body>
</html>
